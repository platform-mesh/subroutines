name: ci

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Always-run jobs (PR + main)
  # ──────────────────────────────────────────────
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@main
    with:
      useTask: true

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@main
    secrets: inherit
    with:
      useTask: true
      useLocalCoverageConfig: true

  # ──────────────────────────────────────────────
  # Quality gate (aggregates required checks)
  # ──────────────────────────────────────────────
  quality-gate:
    if: always()
    permissions: {}
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Release jobs (main branch only)
  # ──────────────────────────────────────────────
  create-version:
    if: github.ref == 'refs/heads/main'
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@main
    secrets: inherit

  publish-version:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          generateReleaseNotes: true
          tag: ${{ needs.create-version.outputs.version }}
          name: ${{ needs.create-version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
